<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: rgb(197, 77, 77);
        }
        .container{
            display: grid;
            grid-template-rows:80px 200px 50px;
            gap: 20px;
            grid-template-columns: 1fr 2fr 1fr;
        }
    </style>
</head>
<body>
    <div class="container"></div>
       <div class="box">1</div>
       <div class="box">2</div>
       <div class="box">3</div>
       <div class="box">4</div>
       <div class="box">5</div>
       <div class="box">6</div>
       <div class="box">7</div>
       <div class="box">8</div>
       
</body>
</html>
